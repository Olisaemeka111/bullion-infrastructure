name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff lint (fail on any lint error)
        run: ruff check --output-format github .

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # No third-party deps: the control plane + tests are pure stdlib unittest.
      - run: python -m tests.run smoke
      - run: python -m tests.run
      - run: python -m tests.run all
      - run: python -m sim.multicloud && python -m sim.simulate && python -m sim.active_active && python -m sim.observe

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
