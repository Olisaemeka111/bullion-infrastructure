name: deploy

# Multi-cloud managed-K8s deploy pipeline.
#   * PR touching iac/terraform  -> terraform plan (commented on the PR)
#   * merge to main              -> terraform apply (gated by the `production` env)
#   * manual run (workflow_dispatch action=destroy) -> terraform destroy
#
# Cloud auth is keyless OIDC. The values below are non-secret OIDC IDENTIFIERS
# (role ARN, WIF provider, etc.) stored as GitHub secrets/variables — the actual
# credentials are short-lived tokens minted per run. Azure is gated by ENABLE_AZURE
# (default false) until a subscription exists; flip it on + add the AZURE_* secrets.

on:
  pull_request:
    paths: ["iac/terraform/**", ".github/workflows/deploy.yml"]
  push:
    branches: [main]
    paths: ["iac/terraform/**", ".github/workflows/deploy.yml"]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        type: choice
        options: [plan, apply, destroy]
        default: plan

permissions:
  id-token: write        # required for cloud OIDC
  contents: read
  pull-requests: write   # required to comment the plan

env:
  TF_IN_AUTOMATION: "true"
  TF_VAR_gcp_project: ${{ vars.GCP_PROJECT }}
  TF_VAR_enable_aws: ${{ vars.ENABLE_AWS || 'true' }}
  TF_VAR_enable_gcp: ${{ vars.ENABLE_GCP || 'true' }}
  TF_VAR_enable_azure: ${{ vars.ENABLE_AZURE || 'false' }}
  # Azure (only used when ENABLE_AZURE=true; empty/ignored otherwise)
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  # ---------------------------------------------------------------- PLAN -----
  plan:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.4"

      - name: Auth AWS (OIDC)
        if: env.TF_VAR_enable_aws == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Auth GCP (OIDC / Workload Identity Federation)
        if: env.TF_VAR_enable_gcp == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Auth Azure (OIDC)
        if: env.TF_VAR_enable_azure == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cluster-infra-mini/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_BACKEND_REGION || 'us-east-1' }}"
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Validate
        run: terraform validate
      - name: Plan
        shell: bash
        run: |
          set -o pipefail
          terraform plan -input=false -out=tfplan -no-color | tee plan.txt

      - name: Plan summary (resources to be created)
        shell: bash
        run: |
          terraform show -json tfplan > plan.json
          c=$(jq -r '[.resource_changes[]|select(.change.actions==["create"])]|length' plan.json)
          u=$(jq -r '[.resource_changes[]|select(.change.actions==["update"])]|length' plan.json)
          r=$(jq -r '[.resource_changes[]|select((.change.actions|sort)==["create","delete"])]|length' plan.json)
          d=$(jq -r '[.resource_changes[]|select(.change.actions==["delete"])]|length' plan.json)
          {
            echo "## Terraform plan summary"
            echo ""
            echo "| Action | Count |"
            echo "|---|---:|"
            echo "| create  | $c |"
            echo "| update  | $u |"
            echo "| replace | $r |"
            echo "| destroy | $d |"
            echo ""
            echo "<details open><summary><b>Resources to create ($c)</b></summary>"
            echo ""
            jq -r '.resource_changes[]|select(.change.actions==["create"])|"- `\(.address)`  _( \(.type) )_"' plan.json
            echo ""
            echo "</details>"
            if [ "$u" != "0" ]; then
              echo ""; echo "<details><summary><b>Resources to update ($u)</b></summary>"; echo ""
              jq -r '.resource_changes[]|select(.change.actions==["update"])|"- `\(.address)`"' plan.json
              echo ""; echo "</details>"
            fi
            if [ "$r" != "0" ] || [ "$d" != "0" ]; then
              echo ""; echo "<details><summary><b>Resources to replace/destroy ($((r+d)))</b></summary>"; echo ""
              jq -r '.resource_changes[]|select(.change.actions|index("delete"))|"- `\(.address)`"' plan.json
              echo ""; echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Plan: $c to create, $u to update, $r to replace, $d to destroy"

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          # tfplan = binary (consumed by apply); plan.txt = human-readable
          path: |
            iac/terraform/tfplan
            iac/terraform/plan.txt
          retention-days: 5

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('iac/terraform/plan.txt', 'utf8');
            if (plan.length > 60000) plan = plan.slice(-60000);
            const body = `### Terraform plan\n\`\`\`\n${plan}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body });

  # --------------------------------------------------------------- APPLY -----
  apply:
    needs: plan
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    runs-on: ubuntu-latest
    environment: production       # add required reviewers here for an approval gate
    defaults:
      run:
        working-directory: iac/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.4"
      - name: Auth AWS (OIDC)
        if: env.TF_VAR_enable_aws == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Auth GCP (OIDC / Workload Identity Federation)
        if: env.TF_VAR_enable_gcp == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Auth Azure (OIDC)
        if: env.TF_VAR_enable_azure == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cluster-infra-mini/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_BACKEND_REGION || 'us-east-1' }}"
      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: iac/terraform
      - name: Apply
        run: terraform apply -input=false -auto-approve tfplan

  # ------------------------------------------------------------- DESTROY -----
  destroy:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: iac/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.4"
      - name: Auth AWS (OIDC)
        if: env.TF_VAR_enable_aws == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Auth GCP (OIDC / Workload Identity Federation)
        if: env.TF_VAR_enable_gcp == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Auth Azure (OIDC)
        if: env.TF_VAR_enable_azure == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cluster-infra-mini/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_BACKEND_REGION || 'us-east-1' }}"
      - name: Destroy
        run: terraform destroy -input=false -auto-approve
