name: game

# Build the DevSecOps board game from its source repo, push to GHCR, and deploy it
# as a GLOBAL ACTIVE-ACTIVE service across BOTH clouds (EKS + GKE). The Istio mesh
# load-balances requests 50/50 across clouds; the istio-ingressgateway on each
# cluster gives a public LoadBalancer address to reach the game.
#
#   build  — checkout game source -> docker build -> push ghcr.io/<owner>/devsecops-board-game
#   deploy — auth both clusters (OIDC) -> ghcr pull secret -> apply game.yaml to both
#            -> wait rollout -> print the ingress LoadBalancer address
#
# Auth is keyless OIDC; CI identities are already cluster-admin on both clusters.

on:
  workflow_dispatch:
    inputs:
      game_ref:
        description: "Branch/tag/SHA of the game repo to build"
        default: main
  push:
    branches: [main]
    paths: ["mesh/apps/game.yaml", ".github/workflows/game.yml"]

permissions:
  id-token: write     # OIDC to AWS/GCP
  contents: read
  packages: write     # push to GHCR

env:
  GAME_REPO: Olisaemeka111/DevSecOps-GitHub-Action-Argo-CD-K8s-Docker-Trivy-on-AWS
  IMAGE_NAME: devsecops-board-game
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  EKS_NAME: bullion-eks
  GKE_NAME: bullion-gke
  GKE_LOCATION: ${{ vars.GCP_ZONE || 'us-central1-a' }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Compute lowercase image ref
        id: meta
        run: |
          set -euo pipefail
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lc}/${IMAGE_NAME}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${owner_lc}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Checkout game source (${{ github.event.inputs.game_ref || 'main' }})
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GAME_REPO }}
          ref: ${{ github.event.inputs.game_ref || 'main' }}
          path: game-src

      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: game-src
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production        # approval gate (creates/uses public LBs)
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4

      # ---- auth + kubeconfig for BOTH clusters (GKE first, then add EKS) ----
      - name: Auth AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Auth GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: GKE kubeconfig
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_NAME }}
          location: ${{ env.GKE_LOCATION }}
      - name: EKS kubeconfig (context 'eks')
        run: aws eks update-kubeconfig --name "$EKS_NAME" --region "$AWS_REGION" --alias eks
      - name: Normalize GKE context to 'gke'
        run: |
          set -euo pipefail
          ctx=$(kubectl config get-contexts -o name | grep "$GKE_NAME" | head -1)
          kubectl config rename-context "$ctx" gke

      # ---- deploy the game to BOTH clusters ----
      - name: Deploy board game (active-active)
        env:
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          set -euo pipefail
          for ctx in eks gke; do
            # namespace + GHCR pull secret must exist before the Deployment pulls
            kubectl --context "$ctx" create namespace game --dry-run=client -o yaml | kubectl --context "$ctx" apply -f -
            kubectl --context "$ctx" label namespace game istio-injection=enabled --overwrite
            kubectl --context "$ctx" -n game create secret docker-registry ghcr \
              --docker-server=ghcr.io \
              --docker-username='${{ github.actor }}' \
              --docker-password='${{ secrets.GITHUB_TOKEN }}' \
              --dry-run=client -o yaml | kubectl --context "$ctx" apply -f -
            # the game owns the shared "*" ingress -> retire the hello demo ingress
            kubectl --context "$ctx" -n demo delete virtualservice hello --ignore-not-found
            kubectl --context "$ctx" -n demo delete gateway hello-ingress --ignore-not-found
            sed "s|__IMAGE__|${IMAGE}|g" mesh/apps/game.yaml | kubectl --context "$ctx" apply -f -
          done
          kubectl --context eks -n game rollout status deploy/board-game --timeout=240s
          kubectl --context gke -n game rollout status deploy/board-game --timeout=300s

      - name: Report LoadBalancer address
        if: always()
        run: |
          set -euo pipefail
          eks_lb=$(kubectl --context eks -n istio-system get svc istio-ingressgateway -o jsonpath='{.status.loadBalancer.ingress[0].hostname}{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          gke_lb=$(kubectl --context gke -n istio-system get svc istio-ingressgateway -o jsonpath='{.status.loadBalancer.ingress[0].ip}{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
          {
            echo "## DevSecOps board game — LIVE (active-active)"
            echo "Image: \`${{ needs.build.outputs.image }}\`"
            echo ""
            echo "Access the game at either cloud's ingress LoadBalancer (each routes 50/50 across both clouds):"
            echo "- **AWS / EKS:**  http://${eks_lb:-<pending>}/"
            echo "- **GCP / GKE:**  http://${gke_lb:-<pending>}/"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "EKS ingress: http://${eks_lb}/"
          echo "GKE ingress: http://${gke_lb}/"
