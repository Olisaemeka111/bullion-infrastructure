# In-cluster secret management with External Secrets Operator (ESO) + Vault.
# CI secrets are pulled by vault-action (GitHub OIDC). RUNTIME/app secrets that
# live inside the clusters (CockroachDB, Grafana, ...) are synced from Vault into
# native Kubernetes Secrets by ESO — no secrets ever committed to git.
#
# Prereqs (per cluster): install ESO (helm repo external-secrets) and enable Vault
# Kubernetes auth bound to the `eso-read` policy (see VAULT.md). Apply to all 3.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "REPLACE_WITH_VAULT_ADDR"   # e.g. https://<cluster>.vault.<...>.hashicorp.cloud:8200
      path: "secret"
      version: "v2"
      namespace: "admin"                   # HCP Vault namespace
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-read"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cockroachdb-creds
  namespace: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cockroachdb-creds          # the K8s Secret CockroachDB consumes
  data:
    - secretKey: username
      remoteRef: { key: cluster-infra-mini/app/cockroachdb, property: username }
    - secretKey: password
      remoteRef: { key: cluster-infra-mini/app/cockroachdb, property: password }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin
  data:
    - secretKey: admin-user
      remoteRef: { key: cluster-infra-mini/app/grafana, property: admin-user }
    - secretKey: admin-password
      remoteRef: { key: cluster-infra-mini/app/grafana, property: admin-password }
