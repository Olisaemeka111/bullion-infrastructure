# CockroachDB Helm values — AWS / EKS region of the multi-cloud cluster.
# (Duplicate as -gcp / -azure, changing locality + the join seeds.)
statefulset:
  replicas: 3

conf:
  # Spreads replicas across clouds; Cockroach won't put all copies in one cloud.
  locality: "cloud=aws,region=us-east-1"
  # Seed nodes from the OTHER clouds (east-west gateway hostnames or LB IPs).
  # Replace with the real cross-cloud reachable addresses after install.
  join:
    - crdb-cockroachdb-0.gke.fleet.internal:26257
    - crdb-cockroachdb-0.aks.fleet.internal:26257
  # Tolerate losing a whole cloud/region.
  cluster-name: fleet-crdb
  single-node: false

tls:
  enabled: true

resources:
  requests: { cpu: "500m", memory: "2Gi" }
  limits: { cpu: "1", memory: "4Gi" }

storage:
  persistentVolume:
    size: 20Gi
