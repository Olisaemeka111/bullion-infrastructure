# Istio multi-primary control plane for the GKE Autopilot cluster (network: gcp).
# NOTE: on GKE Autopilot, Istio runs as ordinary workloads (no node/CNI access
# required), which is exactly why we chose Istio over Cilium Cluster Mesh here.
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: istio-gke
spec:
  profile: default
  values:
    global:
      meshID: mesh-fleet
      multiCluster:
        clusterName: gke
      network: network-gcp
  components:
    ingressGateways:
      - name: istio-eastwestgateway
        label:
          istio: eastwestgateway
          app: istio-eastwestgateway
          topology.istio.io/network: network-gcp
        enabled: true
        k8s:
          service:
            type: LoadBalancer
            ports:
              - { name: status-port, port: 15021, targetPort: 15021 }
              - { name: tls, port: 15443, targetPort: 15443 }
              - { name: tls-istiod, port: 15012, targetPort: 15012 }
              - { name: tls-webhook, port: 15017, targetPort: 15017 }
