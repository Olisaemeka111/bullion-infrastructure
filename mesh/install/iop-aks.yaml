# Istio multi-primary control plane for the AKS cluster (network: azure).
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: istio-aks
spec:
  profile: default
  values:
    global:
      meshID: mesh-fleet
      multiCluster:
        clusterName: aks
      network: network-azure
  components:
    ingressGateways:
      - name: istio-eastwestgateway
        label:
          istio: eastwestgateway
          app: istio-eastwestgateway
          topology.istio.io/network: network-azure
        enabled: true
        k8s:
          service:
            type: LoadBalancer
            ports:
              - { name: status-port, port: 15021, targetPort: 15021 }
              - { name: tls, port: 15443, targetPort: 15443 }
              - { name: tls-istiod, port: 15012, targetPort: 15012 }
              - { name: tls-webhook, port: 15017, targetPort: 15017 }
