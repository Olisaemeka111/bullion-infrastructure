# Makes the global `hello` service ACTIVE-ACTIVE across clouds.
#  * localityLbSetting.distribute spreads traffic from EITHER cloud evenly across
#    both clouds (50/50) — true active-active, not prefer-local.
#  * outlierDetection ejects a cloud's endpoints when they fail, so traffic
#    automatically redistributes to the survivor (the failover behaviour) — note
#    Istio forbids specifying 'distribute' and 'failover' together, so we use
#    distribute + outlier ejection.
#  * Data-plane equivalent of GlobalTrafficDirector in networking/global_lb.py.
# Apply to the `demo` namespace in every cluster.
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: hello-failover
  namespace: demo
spec:
  host: hello.demo.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 1000
    loadBalancer:
      simple: ROUND_ROBIN
      # Explicit 50/50 split across the two cloud regions (active-active), so traffic
      # from either region is balanced across both clusters rather than prefer-local.
      # outlierDetection ejects a failed region -> traffic redistributes (failover).
      localityLbSetting:
        enabled: true
        distribute:
          - from: us-east-1/*
            to:
              "us-east-1/*": 50
              "us-central1/*": 50
          - from: us-central1/*
            to:
              "us-east-1/*": 50
              "us-central1/*": 50
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 5s
      baseEjectionTime: 30s
      maxEjectionPercent: 100 # a fully-failed cloud is 100% ejected -> drains
# NOTE: the north-south ingress (the public "*" Gateway on istio-ingressgateway)
# is owned by the board game (mesh/apps/game.yaml). The hello service stays as an
# in-mesh active-active demo reachable cluster-internally; it no longer binds the
# shared ingress to avoid a Gateway conflict on host "*".
