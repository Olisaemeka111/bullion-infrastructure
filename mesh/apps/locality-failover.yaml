# Makes the global `hello` service ACTIVE-ACTIVE across clouds.
#  * localityLbSetting.distribute spreads traffic from EITHER cloud evenly across
#    both clouds (50/50) — true active-active, not prefer-local.
#  * outlierDetection ejects a cloud's endpoints when they fail, so traffic
#    automatically redistributes to the survivor (the failover behaviour) — note
#    Istio forbids specifying 'distribute' and 'failover' together, so we use
#    distribute + outlier ejection.
#  * Data-plane equivalent of GlobalTrafficDirector in networking/global_lb.py.
# Apply to the `demo` namespace in every cluster.
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: hello-failover
  namespace: demo
spec:
  host: hello.demo.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 1000
    loadBalancer:
      simple: LEAST_REQUEST
      localityLbSetting:
        enabled: true
        # 50/50 across the two clouds, regardless of where the request originates
        distribute:
          - from: "network-aws/*"
            to:
              "network-aws/*": 50
              "network-gcp/*": 50
          - from: "network-gcp/*"
            to:
              "network-aws/*": 50
              "network-gcp/*": 50
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 5s
      baseEjectionTime: 30s
      maxEjectionPercent: 100 # a fully-failed cloud is 100% ejected -> drains
---
# North-south ingress: users hit any cluster's ingress gateway; the same global
# routing applies, so a regional GSLB/DNS (iac/terraform/modules/global_dns) can
# point at all three ingresses active-active.
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: hello-ingress
  namespace: demo
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: hello
  namespace: demo
spec:
  hosts:
    - "*"
  gateways:
    - hello-ingress
  http:
    - route:
        - destination:
            host: hello.demo.svc.cluster.local
            port:
              number: 80
